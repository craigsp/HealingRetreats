/* ── FAVORITES ── */
function getFavs() { try { return JSON.parse(localStorage.getItem('healing_retreat_favs') || '{}'); } catch(e) { return {}; } }
function setFavs(f) { try { localStorage.setItem('healing_retreat_favs', JSON.stringify(f)); } catch(e) {} }
function toggleFav(id, btn) {
  var f = getFavs();
  if (f[id]) { delete f[id]; btn.textContent = '🤍'; btn.classList.remove('active'); }
  else { f[id] = true; btn.textContent = '❤️'; btn.classList.add('active'); }
  setFavs(f);
}
function imgFallback(img, r) {
  img.onerror = null; img.style.display = 'none';
  var fb = img.parentNode.querySelector('.card-img-fallback');
  if (fb) { fb.style.background = gradients[r] || gradients['usa']; fb.style.display = 'flex'; }
}

/* ── FILTER ── */
function sf(f, btn) {
  document.querySelectorAll('.btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  render(f);
}

function render(f) {
  var grid = document.getElementById('grid'), bar = document.getElementById('count-bar');
  grid.innerHTML = '';
  var favs = getFavs(), n = 0;

  retreats.forEach(function(r) {
    if (f === 'favs' && !favs[r.id]) return;
    if (f !== 'all' && f !== 'favs' && r.types.indexOf(f) === -1) return;
    n++;

    var isFav = !!favs[r.id];
    var bh = '';
    if (r.region === 'asia')    bh += '<span class="badge badge-asia">Asia</span> ';
    if (r.region === 'europe')  bh += '<span class="badge badge-europe">Europe</span> ';
    if (r.region === 'usa')     bh += '<span class="badge badge-usa">USA</span> ';
    if (r.region === 'canada')  bh += '<span class="badge badge-canada">Canada</span> ';
    if (r.isFree)               bh += '<span class="badge badge-free">Free</span> ';
    if (r.isCancerOnly)         bh += '<span class="badge badge-cancer">Survivors Only</span> ';
    if (r.isCRC)                bh += '<span class="badge badge-crc">🎗 Colorectal Focused</span>';

    var allTags = (r.tags || []).map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('');
    var crcTagsHtml = '';
    if (r.crcTags && r.crcTags.length) {
      crcTagsHtml = r.crcTags.map(function(t) { return '<span class="tag tag-crc">✦ ' + t + '</span>'; }).join('');
    }

    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="card-img-wrap">' +
        '<img class="card-img" src="' + r.img + '" alt="' + r.name + '" loading="lazy" onerror="imgFallback(this,\'' + r.region + '\')">' +
        '<div class="card-img-fallback" style="display:none;">' + r.icon + '</div>' +
        '<button class="fav-btn ' + (isFav ? 'active' : '') + '" onclick="toggleFav(\'' + r.id + '\',this)" title="Save retreat">' + (isFav ? '❤️' : '🤍') + '</button>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-badges">' + bh + '</div>' +
        '<div class="card-name">' + r.name + '</div>' +
        '<div class="card-loc">' + r.loc + '</div>' +
        '<div class="card-desc">' + r.desc + '</div>' +
        '<div class="card-tags">' + crcTagsHtml + allTags + '</div>' +
      '</div>' +
      '<div class="card-footer">' +
        '<a class="visit-btn" href="' + r.url + '" target="_blank">Visit Website →</a>' +
      '</div>';
    grid.appendChild(card);
  });

  if (n === 0) {
    var msg = f === 'favs' ? 'No saved retreats yet — tap 🤍 on any card to save it here.' : 'No retreats found for this filter.';
    grid.innerHTML = '<div class="no-results">' + msg + '</div>';
  }

  var labels = {
    all: 'Showing all {n} healing retreats worldwide',
    asia: 'Showing {n} retreats in Asia',
    europe: 'Showing {n} retreats in Europe',
    namerica: 'Showing {n} retreats in North America',
    'cancer-only': 'Showing {n} retreats exclusively for cancer survivors',
    crc: 'Showing {n} retreats with confirmed colorectal-focused features',
    free: 'Showing {n} free programs',
    favs: 'Showing {n} saved retreats'
  };
  bar.textContent = (labels[f] || 'Showing {n} retreats').replace('{n}', n);
}

render('all');
</script>
